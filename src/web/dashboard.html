<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>フォーム営業 承認ダッシュボード</title>
  <style>
    :root {
      --bg:#f4f5f7; --card:#fff; --fg:#1c1f23; --muted:#6b7280; --line:#e5e7eb;
      --accent:#2563eb; --ok:#16a34a; --okbg:#16a34a14; --warn:#d97706; --warnbg:#d9770618;
      --danger:#dc2626; --dangerbg:#dc262614; --auto:#7c3aed; --autobg:#7c3aed14; --block:#7c3aed;
      --code:#0000000a;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0d0f13; --card:#171a20; --fg:#e6e8eb; --muted:#9aa2ad; --line:#252b33;
        --accent:#3b82f6; --okbg:#16a34a22; --warnbg:#d9770622; --dangerbg:#dc262622; --autobg:#7c3aed26;
        --code:#ffffff0a; }
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
      background:var(--bg); color:var(--fg); font-size:14px; }
    header { position:sticky; top:0; z-index:20; background:var(--card); border-bottom:1px solid var(--line);
      padding:10px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    header h1 { font-size:15px; margin:0; font-weight:700; }
    .counts { display:flex; gap:12px; flex-wrap:wrap; font-size:12px; color:var(--muted); }
    .counts b { color:var(--fg); }
    .pace-ok { color:var(--ok); font-weight:700; } .pace-no { color:var(--danger); font-weight:700; }
    .wrap { max-width:1280px; margin:0 auto; padding:18px; }
    .section-title { font-size:12px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
      margin:20px 4px 10px; font-weight:700; }

    .card { background:var(--card); border:1px solid var(--line); border-radius:14px; margin-bottom:16px;
      overflow:hidden; }
    .card.flag-missing { border-color:#dc262655; }
    .chead { display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:14px 16px;
      border-bottom:1px solid var(--line); }
    .chead h2 { font-size:15px; margin:0; font-weight:700; }
    .chead .domain { color:var(--muted); font-size:12px; }
    .spacer { flex:1 1 auto; }
    .badge { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700; color:#fff; }
    .g-high{background:var(--ok)} .g-mid{background:var(--warn)} .g-low{background:var(--danger)}
    .g-block{background:var(--block)} .g-unknown{background:var(--muted)}
    .chip { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:999px;
      font-size:12px; font-weight:600; border:1px solid var(--line); background:var(--code); }
    .chip.good{ color:var(--ok); border-color:var(--ok); }
    .chip.bad{ color:var(--danger); border-color:var(--danger); background:var(--dangerbg); }
    .chip.warn{ color:var(--warn); border-color:var(--warn); background:var(--warnbg); }
    .chip.auto{ color:var(--auto); border-color:var(--auto); background:var(--autobg); }

    .cbody { display:grid; grid-template-columns:1.15fr .85fr; gap:0; }
    @media (max-width:940px){ .cbody{ grid-template-columns:1fr; } }
    .col-fields { padding:14px 16px; border-right:1px solid var(--line); }
    @media (max-width:940px){ .col-fields{ border-right:none; border-bottom:1px solid var(--line);} }
    .col-shot { padding:14px 16px; }

    table.fields { width:100%; border-collapse:collapse; }
    table.fields th { text-align:left; font-size:11px; color:var(--muted); font-weight:600;
      padding:0 8px 6px; border-bottom:1px solid var(--line); }
    table.fields td { padding:7px 8px; vertical-align:top; border-bottom:1px solid var(--line); }
    tr.st-ok td.icn{ color:var(--ok) } tr.st-suspect{ background:var(--warnbg) } tr.st-missing{ background:var(--dangerbg) }
    tr.st-auto td.icn{ color:var(--auto) } tr.st-optional{ opacity:.55 } tr.st-honeypot{ opacity:.4 }
    td.icn { width:20px; font-weight:700; }
    .flabel { font-weight:600; }
    .flabel .req { color:var(--danger); font-weight:700; margin-left:3px; }
    .ftype { font-size:10px; color:var(--muted); font-family:ui-monospace,Menlo,Consolas,monospace; }
    .fval { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; word-break:break-word; }
    .fval.empty { color:var(--danger); font-weight:600; }
    .fnote { font-size:11px; color:var(--warn); margin-top:2px; }
    tr.st-missing .fnote{ color:var(--danger); }
    .toggle { font-size:12px; color:var(--accent); cursor:pointer; margin-top:8px; display:inline-block; user-select:none; }

    .shotframe { border:1px solid var(--line); border-radius:10px; overflow:auto; max-height:520px; background:#0002; }
    .shotframe img { display:block; width:100%; height:auto; cursor:zoom-in; }
    .noshot { padding:40px; text-align:center; color:var(--muted); }
    .shothint { font-size:11px; color:var(--muted); margin:6px 2px 0; }
    details.msg { margin-top:12px; }
    details.msg summary { cursor:pointer; font-size:12px; color:var(--muted); font-weight:600; }
    .msgbox { white-space:pre-wrap; font-size:12px; background:var(--code); border:1px solid var(--line);
      border-radius:8px; padding:10px; margin-top:8px; max-height:260px; overflow:auto; }
    .subj { font-size:12px; margin:8px 0 0; } .subj b{ color:var(--muted); font-weight:600; }

    details.edit { border-top:1px solid var(--line); background:var(--code); padding:10px 16px; }
    details.edit > summary { cursor:pointer; font-size:13px; font-weight:700; color:var(--accent);
      list-style:none; display:flex; align-items:center; gap:8px; user-select:none; }
    details.edit > summary::-webkit-details-marker { display:none; }
    details.edit > summary::before { content:'▸'; font-size:11px; }
    details.edit[open] > summary::before { content:'▾'; }
    .editgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; margin:12px 0; }
    @media (max-width:940px){ .editgrid{ grid-template-columns:1fr; } }
    .editfield { display:flex; flex-direction:column; gap:4px; }
    .editfield.full { grid-column:1 / -1; }
    .editfield label { font-size:11px; color:var(--muted); font-weight:600; }
    .editfield input, .editfield textarea { font:inherit; font-size:13px; padding:7px 9px;
      border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--fg); width:100%; }
    .editfield input:focus, .editfield textarea:focus { outline:none; border-color:var(--accent); }
    .editfield textarea { resize:vertical; font-family:ui-monospace,Menlo,Consolas,monospace; line-height:1.5; }
    .editfield input.dirty, .editfield textarea.dirty { border-color:var(--warn); background:var(--warnbg); }
    .editactions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .edithint { font-size:11px; color:var(--muted); }

    .actions { display:flex; gap:8px; flex-wrap:wrap; padding:12px 16px; border-top:1px solid var(--line);
      background:var(--code); }
    button { font:inherit; font-size:13px; padding:7px 14px; border-radius:8px; border:1px solid var(--line);
      background:var(--card); color:var(--fg); cursor:pointer; }
    button:hover { border-color:var(--accent); }
    button.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
    button.ok{ background:var(--ok); color:#fff; border-color:var(--ok); }
    button.danger{ color:var(--danger); } button:disabled{ opacity:.5; cursor:default; }
    a.formlink { color:var(--accent); font-size:12px; text-decoration:none; }
    .empty { color:var(--muted); padding:34px; text-align:center; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#111827; color:#fff;
      padding:10px 18px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:50; }
    .toast.show{ opacity:1; }
    dialog { border:none; border-radius:12px; padding:0; max-width:96vw; max-height:96vh; background:transparent; }
    dialog::backdrop{ background:#000a; } dialog img{ max-width:96vw; max-height:92vh; border-radius:10px; }
  </style>
</head>
<body>
  <header>
    <h1>📮 フォーム営業 承認ダッシュボード</h1>
    <div class="counts" id="counts"></div>
    <div class="spacer"></div>
    <button id="sweep" title="消費者向け/CAPTCHA/入力不能な必須を持つフォームをキューから自動除外">非適格を自動除外</button>
    <button id="refresh">再読込</button>
  </header>
  <div class="wrap">
    <div class="section-title">承認待ち（各フォームの入力内容を項目単位で確認）</div>
    <div id="pending"></div>
    <div class="section-title" id="excluded-title" style="display:none">自動除外（非B2B / CAPTCHA / 入力不能な必須）</div>
    <div id="excluded"></div>
    <div class="section-title" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <span>承認済み・送信可（APPROVED）</span>
      <button id="sendAll" class="primary" style="margin-left:auto">🚀 一斉送信</button>
      <span id="bulkProgress" style="font-size:12px;color:var(--muted);text-transform:none;letter-spacing:0"></span>
    </div>
    <div id="approved"></div>
  </div>
  <div class="toast" id="toast"></div>
  <dialog id="lightbox"><img id="lbimg" src="" alt="preview" /></dialog>

  <script>
    const $ = (s) => document.querySelector(s);
    const toast = (m) => { const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); };
    const esc = (s) => (s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    async function api(path, method='GET', body) {
      const res = await fetch(path,{ method, headers: body?{'content-type':'application/json'}:{}, body: body?JSON.stringify(body):undefined });
      if(!res.ok){ throw new Error((await res.text())||res.status); }
      return res.headers.get('content-type')?.includes('json') ? res.json() : res.text();
    }

    const STATUS_ORDER = { missing:0, suspect:1, auto:2, ok:3, optional:4, honeypot:5 };
    const ICON = { ok:'✓', suspect:'⚠', missing:'✕', auto:'⟳', optional:'·', honeypot:'🛈' };

    function coverageChips(cov){
      const chips = [];
      const filledClass = cov.missing>0 ? 'bad' : 'good';
      chips.push(`<span class="chip ${filledClass}">必須 ${cov.requiredFilled}/${cov.requiredTotal} 充足</span>`);
      if(cov.missing>0)  chips.push(`<span class="chip bad">未入力 ${cov.missing}</span>`);
      if(cov.suspect>0)  chips.push(`<span class="chip warn">誤り疑い ${cov.suspect}</span>`);
      const autos = 0; // auto count folded into required-filled; shown per-row
      return chips.join(' ');
    }

    function fieldRow(f){
      const emptyCls = (f.status==='missing') ? ' empty' : '';
      const typ = esc((f.tag||'') + (f.type?('/'+f.type):''));
      return `<tr class="st-${f.status}">
        <td class="icn">${ICON[f.status]||''}</td>
        <td><div class="flabel">${esc(f.label||'(ラベルなし)')}${f.required?'<span class="req">必須</span>':''}</div>
            <div class="ftype">${typ}${f.role?(' · '+esc(f.role)):''}${f.confidence!=null?(' · '+Math.round(f.confidence*100)+'%'):''}</div></td>
        <td><div class="fval${emptyCls}">${esc(f.value)}</div>${f.note?`<div class="fnote">${esc(f.note)}</div>`:''}</td>
      </tr>`;
    }

    function editRow(f){
      const control = f.multiline
        ? `<textarea data-role="${esc(f.role)}" data-orig="${esc(f.value)}" rows="7" oninput="markDirty(this)">${esc(f.value)}</textarea>`
        : `<input data-role="${esc(f.role)}" data-orig="${esc(f.value)}" value="${esc(f.value)}" oninput="markDirty(this)">`;
      return `<div class="editfield${f.multiline?' full':''}">
        <label>${esc(f.label)} <span class="ftype">${esc(f.role)}</span></label>${control}</div>`;
    }

    function editPanel(it){
      if(!it.editable || !it.editable.length) return '';
      const editedBadge = it.edited ? '<span class="chip warn">編集済み</span>' : '';
      const resetBtn = it.edited ? `<button class="danger" onclick="resetContent(${it.companyId})">編集をリセット</button>` : '';
      return `<details class="edit"${it.edited?' open':''}>
        <summary>✏️ 送信内容を手動で修正・変更 ${editedBadge}</summary>
        <div class="editgrid">${it.editable.map(editRow).join('')}</div>
        <div class="editactions">
          <button class="ok" onclick="saveContent(${it.companyId},false)">保存</button>
          <button class="primary" onclick="saveContent(${it.companyId},true)">保存して再プレビュー</button>
          ${resetBtn}
          <span class="edithint">保存で項目照合ビューに即反映。「再プレビュー」は確認画面スクショも更新（ブラウザ起動・数秒）。</span>
        </div>
      </details>`;
    }

    function pendingCard(it){
      const shot = it.screenshot ? `/artifacts/${it.screenshot.split(/[\\\/]/).pop()}` : '';
      const rows = [...it.fields].sort((a,b)=>(STATUS_ORDER[a.status]-STATUS_ORDER[b.status]));
      const primary = rows.filter(f => f.status!=='optional' && f.status!=='honeypot');
      const extra   = rows.filter(f => f.status==='optional' || f.status==='honeypot');
      const cardFlag = it.coverage.missing>0 ? ' flag-missing' : '';
      const confirmTag = it.hasConfirmScreen ? '<span class="chip">確認画面あり</span>' : '<span class="chip">1段フォーム</span>';
      const captchaTag = (it.hasCaptcha && it.hasCaptcha!=='none') ? `<span class="chip warn">CAPTCHA ${esc(it.hasCaptcha)}</span>` : '';

      return `<div class="card${cardFlag}" data-id="${it.companyId}">
        <div class="chead">
          <h2>#${it.companyId} ${esc(it.name)}</h2>
          <span class="badge g-${it.gate}">gate: ${esc(it.gate)}</span>
          ${coverageChips(it.coverage)} ${confirmTag} ${captchaTag}
          <div class="spacer"></div>
          <a class="formlink" href="${esc(it.formUrl||'')}" target="_blank" rel="noopener">${esc(it.domain)} ↗</a>
        </div>
        <div class="cbody">
          <div class="col-fields">
            <table class="fields"><thead><tr><th></th><th>フォーム項目（実際のラベル）</th><th>入力される値</th></tr></thead>
              <tbody>${primary.map(fieldRow).join('')||'<tr><td colspan="3" class="empty">解析済み項目なし</td></tr>'}</tbody>
            </table>
            ${extra.length?`<span class="toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'table':'none';this.textContent=this.textContent.startsWith('▸')?'▾ 任意・罠 ${extra.length} 件を隠す':'▸ 任意・罠 ${extra.length} 件を表示'">▸ 任意・罠 ${extra.length} 件を表示</span>
            <table class="fields" style="display:none;margin-top:6px"><tbody>${extra.map(fieldRow).join('')}</tbody></table>`:''}
          </div>
          <div class="col-shot">
            ${shot?`<div class="shotframe"><img src="${shot}" onclick="zoom('${shot}')"></div>
              <div class="shothint">実際のプレビュー全体（クリックで拡大）。確認画面 or 入力済みフォーム。</div>`
              :'<div class="noshot">スクショなし</div>'}
            <p class="subj"><b>件名：</b>${esc(it.subject||'(なし)')}</p>
            <details class="msg"><summary>本文（textarea に入る全文）を表示</summary><div class="msgbox">${esc(it.body||'')}</div></details>
          </div>
        </div>
        ${editPanel(it)}
        <div class="actions">
          <button class="ok" onclick="act(${it.companyId},'approve')">承認</button>
          <button class="primary" onclick="act(${it.companyId},'approve-execute')">承認して即送信</button>
          <button class="danger" onclick="act(${it.companyId},'reject')">却下</button>
          <button onclick="suppress(${it.companyId})">抑制</button>
        </div>
      </div>`;
    }

    function approvedCard(it){
      return `<div class="card" data-id="${it.companyId}">
        <div class="chead"><h2>#${it.companyId} ${esc(it.name)}</h2>
          <span class="badge g-${it.gate}">gate: ${esc(it.gate)}</span>
          <span class="domain">承認者: ${esc(it.approvedBy||'-')}</span><div class="spacer"></div></div>
        <div class="actions"><button class="primary" onclick="act(${it.companyId},'execute')">送信実行</button></div>
      </div>`;
    }

    const EXCL_REASON = { captcha:'CAPTCHA必須', no_sales_policy:'営業お断り', consumer_form:'消費者向け/非B2B', unfillable_required:'入力不能な必須あり', not_contactable:'本文/会社名の入力先なし' };
    function excludedCard(it){
      return `<div class="card" data-id="${it.companyId}">
        <div class="chead"><h2>#${it.companyId} ${esc(it.name)}</h2>
          <span class="chip bad">除外: ${esc(EXCL_REASON[it.reason]||it.reason)}</span>
          ${it.detail?`<span class="chip">${esc(it.detail)}</span>`:''}
          <span class="domain">${esc(it.domain)}</span><div class="spacer"></div>
          <button onclick="act(${it.companyId},'requeue')">キューに戻す</button>
        </div></div>`;
    }

    async function load(){
      const [status, pending, approved, excluded] = await Promise.all([ api('/api/status'), api('/api/pending'), api('/api/approved'), api('/api/excluded') ]);
      const pace = status['_送信可'];
      const parts = Object.entries(status).filter(([k])=>k!=='_送信可').map(([k,v])=>`${k}: <b>${v}</b>`);
      parts.push(pace ? '<span class="pace-ok">● 送信可能時間帯</span>' : '<span class="pace-no">● 送信時間外</span>');
      $('#counts').innerHTML = parts.join(' · ');
      $('#pending').innerHTML = pending.length ? pending.map(pendingCard).join('') : '<div class="empty">承認待ちはありません</div>';
      $('#excluded-title').style.display = excluded.length ? 'block' : 'none';
      $('#excluded').innerHTML = excluded.map(excludedCard).join('');
      $('#approved').innerHTML = approved.length ? approved.map(approvedCard).join('') : '<div class="empty">承認済みはありません</div>';
    }

    async function act(id, action){
      try{
        if(action==='approve'){ await api(`/api/companies/${id}/approve`,'POST'); toast(`#${id} を承認しました`); }
        else if(action==='reject'){ if(!confirm(`#${id} を却下しますか？`))return; await api(`/api/companies/${id}/reject`,'POST'); toast(`#${id} を却下しました`); }
        else if(action==='execute'){ toast(`#${id} 送信中…`); const r=await api(`/api/companies/${id}/execute`,'POST'); toast(`#${id}: ${r.status} ${r.detail||''}`.slice(0,90)); }
        else if(action==='approve-execute'){ if(!confirm(`#${id} を承認して即送信しますか？`))return; await api(`/api/companies/${id}/approve`,'POST'); toast(`#${id} 送信中…`); const r=await api(`/api/companies/${id}/execute`,'POST'); toast(`#${id}: ${r.status}`); }
        else if(action==='requeue'){ await api(`/api/companies/${id}/requeue`,'POST'); toast(`#${id} をキューに戻しました`); }
        await load();
      }catch(e){ toast('エラー: '+String(e.message).slice(0,90)); }
    }

    async function suppress(id){
      const reason = prompt('抑制理由: opt_out / no_sales_policy / competitor / already_sent','opt_out');
      if(!reason) return;
      try{ await api(`/api/companies/${id}/suppress`,'POST',{reason}); toast(`#${id} を抑制しました`); await load(); }
      catch(e){ toast('エラー: '+String(e.message).slice(0,90)); }
    }

    // ---- 手動編集（送信内容の修正・変更）----
    function markDirty(el){ el.classList.toggle('dirty', el.value !== (el.dataset.orig ?? '')); }

    // True while the user is editing (focused in a panel, or has unsaved changes).
    // Used to suppress the background auto-reload so edits aren't wiped mid-type.
    function hasActiveEdit(){
      const ae = document.activeElement;
      if (ae && ae.closest && ae.closest('details.edit')) return true;
      return !!document.querySelector('details.edit .dirty');
    }

    async function saveContent(id, replan){
      const card = document.querySelector(`.card[data-id="${id}"]`);
      if(!card) return;
      const values = {};
      card.querySelectorAll('.edit [data-role]').forEach(el=>{
        if(el.value !== (el.dataset.orig ?? '')) values[el.dataset.role] = el.value;
      });
      const changed = Object.keys(values).length;
      try{
        if(changed){ await api(`/api/companies/${id}/content`,'PUT',{ values }); }
        if(replan){
          toast(`#${id} 再プレビュー中…（ブラウザ起動・数秒）`);
          await api(`/api/companies/${id}/replan`,'POST');
          toast(`#${id} を保存して再プレビューしました`);
        } else if(changed){ toast(`#${id} の編集を保存しました（${changed}項目）`); }
        else { toast('変更はありません'); return; }
        await load();
      }catch(e){ toast('エラー: '+String(e.message).slice(0,90)); }
    }

    async function resetContent(id){
      if(!confirm(`#${id} の手動編集をすべて破棄して既定値に戻しますか？`)) return;
      try{ await api(`/api/companies/${id}/content/reset`,'POST'); toast(`#${id} の編集をリセットしました`); await load(); }
      catch(e){ toast('エラー: '+String(e.message).slice(0,90)); }
    }

    // ---- 一斉送信（bulk send of all APPROVED companies）----
    let bulkTimer = null;

    async function sendAll() {
      let approved = [];
      try { approved = await api('/api/approved'); } catch (e) { toast('エラー: ' + e.message.slice(0,80)); return; }
      if (!approved.length) { toast('承認済みの送信対象がありません'); return; }
      if (!confirm(`承認済み ${approved.length} 社の問い合わせフォームに一斉送信します。\n送信間隔・日次上限・送信可能時間帯のルールは維持されます。\nよろしいですか？`)) return;
      const btn = $('#sendAll');
      btn.disabled = true;
      try {
        const r = await api('/api/execute-all', 'POST');
        if (!r.started) { toast(r.message || '送信対象がありません'); btn.disabled = false; return; }
        toast(`一斉送信を開始しました（${r.started} 社）`);
        pollBulk();
      } catch (e) { toast('エラー: ' + e.message.slice(0,80)); btn.disabled = false; }
    }

    function renderBulk(s) {
      const prog = $('#bulkProgress');
      const btn = $('#sendAll');
      if (s && s.running) {
        btn.disabled = true;
        prog.textContent = `送信中… ${s.done}/${s.total}（成功 ${s.success} / 失敗 ${s.failed} / スキップ ${s.skipped}）`
          + (s.current ? ` – ${s.current}` : '');
        return true;
      }
      btn.disabled = false;
      if (s && s.total) {
        prog.textContent = `完了: 成功 ${s.success} / 失敗 ${s.failed} / スキップ ${s.skipped}`;
      }
      return false;
    }

    async function pollBulk() {
      if (bulkTimer) { clearInterval(bulkTimer); bulkTimer = null; }
      const tick = async () => {
        let s;
        try { s = await api('/api/execute-all/status'); } catch { return false; }
        const running = renderBulk(s);
        await load();
        if (!running) {
          if (bulkTimer) { clearInterval(bulkTimer); bulkTimer = null; }
          if (s && s.total) toast(`一斉送信 完了（成功 ${s.success} / 失敗 ${s.failed} / スキップ ${s.skipped}）`);
        }
        return running;
      };
      const running = await tick();
      if (running) bulkTimer = setInterval(tick, 3000);
    }

    function zoom(src) { $('#lbimg').src = src; $('#lightbox').showModal(); }
    $('#lightbox').addEventListener('click', () => $('#lightbox').close());
    $('#refresh').addEventListener('click', load);
    $('#sendAll').addEventListener('click', sendAll);
    $('#sweep').addEventListener('click', async()=>{
      try{ const r=await api('/api/sweep','POST'); toast(`非適格 ${r.excluded} 件を除外しました`); await load(); }
      catch(e){ toast('エラー: '+String(e.message).slice(0,90)); }
    });
    load();
    // Resume the progress view if a bulk send is already running (e.g. page reload mid-run).
    api('/api/execute-all/status').then((s) => { if (s && s.running) pollBulk(); }).catch(() => {});
    setInterval(() => { if (!hasActiveEdit()) load(); }, 15000);
  </script>
</body>
</html>
